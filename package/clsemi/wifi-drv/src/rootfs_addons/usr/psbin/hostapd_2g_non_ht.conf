#open AP

country_code=US

interface=wlan0

driver=nl80211
ssid=open
channel=1
hw_mode=g
#hw_mode=any
# Beacon interval in kus (1.024 ms) (default: 100; range 15..65535)
beacon_int=100

macaddr_acl=0

# QoS support
wmm_enabled=1

# 是否隐藏SSID
ignore_broadcast_ssid=0

auth_algs=1

wpa=0

wpa_passphrase=123456789

wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
#wpa_group_rekey=86400


# log信息
# 两种输出方法：syslog 和 stdout（仅在不分叉到后台时可用）。
# Module bitfield (ORed bitfield of modules that will be logged; -1 = all
# modules):
# bit 0 (1) = IEEE 802.11
# bit 1 (2) = IEEE 802.1X
# bit 2 (4) = RADIUS
# bit 3 (8) = WPA
# bit 4 (16) = driver interface
# bit 6 (64) = MLME
#
# Levels (minimum value for logged events):
#  0 = verbose debugging
#  1 = debugging
#  2 = informational messages
#  3 = notification
#  4 = warning
#
#logger_syslog=63
#logger_syslog_level=0
#logger_stdout=63
#logger_stdout_level=0

# 独立控制程序接口。如果指定了该参数，hostapd将创建这个目录和一个UNIX域套接字，
# 用于侦听来自外部程序(CLI/GUI等)的状态信息和配置请求。
# 套接字文件将基于接口名称命名，因此如果使用多个接口，
# 则可以同时运行多个hostapd进程/接口。
ctrl_interface=/var/run/hostapd_wlan0


#ieee80211n=1



