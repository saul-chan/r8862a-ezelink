[config]
agbaud=3000000
dlbaud=3000000

[control]
detect = 0
atreset = at+ecrst=delay,1000
atbaud = 115200
uart_timeout = 100
pullup_qspi = 1
debug = 0
dribble_dld_en = 1
usb_enable = 1
;dld_upg_ctrl_valid=1
;dld_upg_connwait_100ms_cnt=50
;dld_upg_ctrlwait_100ms_cnt=100

[storage_cfg]
format_path = ./config/format_ec718s.json

[package_info]
pkgpath = ./config/image.binpkg

[agentboot]
agpath = ./config/agentboot_718.bin
ctrl = 6
; unit: MB
ap_size = 2
; unit: MB, 15 means none
cp_size = 15

[bootloader]
blpath = ./config/ap_bootloader.bin
burnaddr = 0x3000

[system]
syspath = ./config/ap_fibo_soft.bin
burnaddr = 0x72000

[cp_system]
cp_syspath = ./config/cp-demo-flash.bin
burnaddr = 0x1a000
storage_type=ap_flash

[flexfile0]
filepath = ./config/MergeRfTable_EC718_48K.bin
burnaddr = 0x1f3000
storage_type=ap_flash


[otherfile1]
filepath = fs.fs
burnaddr = 0xb84000
;ap_flashÆđÊŒ”ŰÖ·ÎȘ0x800000Ł»cp_flashÆđÊŒ”ŰÖ·ÎȘ0x8800000
storage_type=ap_flash
		
[otherfile2]
filepath = ./config/MergeRfTable_EC718_48K.bin
burnaddr = 0xe7000
storage_type=cp_flash

